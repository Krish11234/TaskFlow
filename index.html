<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <nav>
            <div class="left">Kanban Board</div>
            <button class="addBtn" id="toggle-modal">Add new task</button>
        </nav>
        <section class="board">
            <div id="todo" class="task-column">
                <div class="heading">
                    <div class="left">To Do</div>
                    <div class="right">Count</div>
                </div>
                <div draggable="true" class="task">
                    <h2 class="task-title">Task1</h2>
                    <p class="task-desc">Desc for task 1</p>
                    <button class="delete-btn">Delete</button>
                </div>
                <!-- <div draggable="true" class="task">
                    <h2 class="task-title">Task12</h2>
                    <p class="task-desc">Desc for task 1</p>
                    <button class="delete-btn">Delete</button>
                </div> -->
            </div>
            <div id="progress" class="task-column">
                <div class="heading">
                    <div class="left">In Progress</div>
                    <div class="right">Count</div>
                </div>
            </div>
            <div id="done" class="task-column">
                <div class="heading">
                    <div class="left">Done</div>
                    <div class="right">Count</div>
                </div>
            </div>
        </section>
    </main>
    
    <div class="modal add-new-task">
      <div class="bg"></div>
      <div class="center">
        <input 
        type="text"
        placeholder="Task Title"
        id="input-text"
        />
        <textarea placeholder="Type Description"></textarea>
        <button class="add-task-btn" id="add-new-task">Add Task</button>
      </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
